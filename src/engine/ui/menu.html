<!-- Action Bar (permanent buttons below canvas) -->
<div id="engine-action-bar">
    <button id="btn-system" class="action-bar-btn action-bar-icon" title="System Access">
        <span class="icon">☰</span>
    </button>
    <button id="btn-tools" class="action-bar-btn">
        <span class="action-bar-label">Tools</span>
    </button>
    <button id="btn-record" class="action-bar-btn action-bar-icon" title="Record Video">
        <span class="icon">⏺</span>
    </button>
</div>

<!-- Menu Container (drawer) -->
<div id="menu-container" class="menu-closed">
    <!-- Menu Panel -->
    <div id="menu-panel">

        <!-- Main Row -->
        <div class="main-row">
            <!-- Brush Size Column -->
            <div class="brush-column">
                <div class="section-label">Size</div>
                <button class="menu-btn" data-action="increaseBrushSize" title="Increase brush size ([)">
                    <span class="icon">∧</span>
                </button>
                <div class="brush-size-display" title="Drag to adjust brush size">
                    <div class="drag-chevrons up">
                        <span>›</span>
                        <span>›</span>
                    </div>
                    <div class="brush-size-display-inner">
                        <div class="brush-preview"></div>
                        <span class="brush-size-label">1</span>
                    </div>
                    <div class="drag-chevrons down">
                        <span>›</span>
                        <span>›</span>
                    </div>
                </div>
                <button class="menu-btn" data-action="decreaseBrushSize" title="Decrease brush size (])">
                    <span class="icon">∨</span>
                </button>
            </div>

            <!-- Movement Section -->
            <div class="movement-section">
                <!-- Manual / Organic Toggle -->
                <div class="mode-toggle" id="mode-toggle" data-action="toggleManualMode" title="Toggle Manual/Organic Mode (X)">
                    <span class="mode-toggle-label" data-mode="manual">Manual</span>
                    <div class="mode-toggle-track">
                        <div class="mode-toggle-thumb"></div>
                    </div>
                    <span class="mode-toggle-label" data-mode="organic">Organic</span>
                </div>
                <div class="menu-spacer"></div>
                <div class="section-label">Movement</div>
                <div class="cross-container">
                    <!-- Row 1 -->
                    <button class="menu-btn" data-action="trickle" title="Trickle (T)">
                        <span class="icon" style="display:inline-block;transform:rotate(90deg)">≈</span>
                    </button>
                    <button class="menu-btn arrow-btn" data-action="waterfallUp" title="Waterfall Up (↑)">
                        <span class="icon">⤊</span>
                    </button>
                    <button class="menu-btn" data-action="shuffle" title="Shuffle (S)">
                        <span class="icon">≈</span>
                    </button>
                    <!-- Row 2 -->
                    <button class="menu-btn arrow-btn" data-action="moveLeft" title="Move Left (←)">
                        <span class="icon">←</span>
                    </button>
                    <button class="menu-btn" id="btn-pause" data-action="toggleGlobalFreeze" title="Pause (Space)">
                        <span class="icon">⏸︎</span>
                    </button>
                    <button class="menu-btn arrow-btn" data-action="moveRight" title="Move Right (→)">
                        <span class="icon">→</span>
                    </button>
                    <!-- Row 3 -->
                    <button class="menu-btn" data-action="eraseMovement" title="Erase Movement (E cycles erase)">
                        <span class="icon">⌫</span>
                    </button>
                    <button class="menu-btn arrow-btn" data-action="waterfallDown" title="Waterfall Down (↓)">
                        <span class="icon">⤋</span>
                    </button>
                    <button class="menu-btn" data-action="freezeBrush" title="Freeze Movement (F)">
                        <span class="icon">❄︎</span>
                    </button>
                </div>
            </div>

            <!-- Paint Section -->
            <div class="paint-section">
                <div class="section-label">Paint</div>
                <div class="paint-column">
                    <button class="menu-btn" data-action="drawSpace" title="Space (O)">
                        <span class="icon">○</span>
                    </button>
                    <button class="menu-btn" data-action="drawGem" title="Gem (G)">
                        <span class="icon">◆</span>
                    </button>
                    <button class="menu-btn" data-action="drawStatic" title="Static (D)">
                        <span class="icon">⁘</span>
                    </button>
                    <button class="menu-btn" data-action="resetInitialMovement" title="Erase Paint (E cycles erase)">
                        <span class="icon">↺</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
